[project]
name = "nv-dfm-lib-weather"
dynamic = ["version"]
description = "Weather data adapters for DFM"
readme = "README.md"
authors = [{ name = "NVIDIA"}]
requires-python = ">=3.12, <3.13"
# Lightweight core dependencies - no CUDA/torch packages
dependencies = [
    "cartopy>=0.25.0",
    "earth2studio[data]==0.10.0", ## Data loaders
    "gcsfs>=2025.9.0",
    "herbie-data>=2025.12.0",   ## HRRR ERA5 data
    "intake-esgf>=2025.9.26",   ## CMIP6 data
    "metpy>=1.7.1",             ## HRRR ERA5 data
    "netCDF4>=1.6.4,<1.7.3", # https://github.com/Unidata/netcdf4-python/issues/1438
    "nvidia-physicsnemo<=1.3.0",
    "nv-dfm-core>=3.1.0,<3.2.0",
    "nv-dfm-lib-common>=3.1.0,<3.2.0",
    "pillow",
    "pytz>=2025.2",
    "rioxarray>=0.19.0",
    "zarr>=2.18.3",             ## ECMWF ERA5 data
]

[project.optional-dependencies]
# Cbottle (Climate in a Bottle) model
cbottle = [
    "earth2studio[cbottle]==0.10.0",
]
# Spherical Fourier Neural Operator
sfno = [
    "earth2studio[sfno]==0.10.0",
]
# All optional dependencies
all = [
    "earth2studio[cbottle,sfno]==0.10.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# PyTorch index only needed when installing extras with ML dependencies
# Removed from here to avoid triggering resolution when not needed

[tool.hatch.version]
source = "vcs"
tag-pattern = "nv-dfm-v(?P<version>.*)"
raw-options = { root = "../.." }

[tool.hatch.build.targets.wheel]
packages = ["nv_dfm_lib_weather"]

[tool.hatch.build.targets.sdist]
packages = ["nv_dfm_lib_weather"]

[dependency-groups]
dev = [
    "scikit-image>=0.25.2",
]
