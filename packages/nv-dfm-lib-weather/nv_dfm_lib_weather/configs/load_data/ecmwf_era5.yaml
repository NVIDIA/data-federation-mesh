operation:
  dataloader.LoadEcmwfEra5Data:
      description: "Loads the ECMWF ERA5 data"
      parameters:
        variables:
          description: "The variables to load"
          type: array
        selection:
          description: "The selection to load"
          type: object
      required:
        - variables
        - selection
      returns: object
interface:
  "#/operations/dataloader.LoadEcmwfEra5Data":
    adapter: nv_dfm_lib_weather.load_data.LoadEcmwfEra5Data
    description: "Loads the ECMWF ERA5 data"
    is-async: true
    args:
      variables:
        from-param: variables
      selection:
        from-param: selection