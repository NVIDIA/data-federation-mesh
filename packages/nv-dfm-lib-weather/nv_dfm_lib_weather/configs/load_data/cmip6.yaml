operation:
  dataloader.LoadCmip6Data:
    description: "Loads the CMIP6 data"
    parameters:
      variables:
        description: "The variables to load"
        type: array
      selection:
        description: "The selection to load"
        type: object
      experiment_id:
        description: "The experiment ID"
        type: string
      source_id:
        description: "The source ID"
        type: string
      table_id:
        description: "The table ID"
        type: string
      variant_label:
        description: "The variant label"
        type: string
      invalidate_cache:
        description: "Whether to invalidate the cache"
        type: boolean
    required:
      - variables
      - selection
    returns: object
interface:
  "#/operations/dataloader.LoadCmip6Data":
    adapter: nv_dfm_lib_weather.load_data.LoadCmip6Data
    description: "Loads the CMIP6 data"
    is-async: true
    args:
      variables:
        from-param: variables
      selection:
        from-param: selection
      experiment_id:
        from-param: experiment_id
      source_id:
        from-param: source_id
      table_id:
        from-param: table_id
      variant_label:
        from-param: variant_label
      invalidate_cache:
        from-param: invalidate_cache