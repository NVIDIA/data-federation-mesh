operation:
  dataloader.LoadGfsEra5Data:
    description: "Loads the GFS ERA5 data using Earth2Studio backend"
    parameters:
      variables:
        description: "The variables to load"
        type: array
      selection:
        description: "The selection to load (time required, optional mode and timeout)"
        type: object
      invalidate_cache:
        description: "Whether to invalidate the cache"
        type: boolean
    required:
      - variables
      - selection
    returns: object
interface:
  "#/operations/dataloader.LoadGfsEra5Data":
    adapter: nv_dfm_lib_weather.load_data.LoadGfsEra5Data
    description: "Loads the GFS ERA5 data"
    is-async: true
    args:
      variables:
        from-param: variables
      selection:
        from-param: selection
      invalidate_cache:
        from-param: invalidate_cache
