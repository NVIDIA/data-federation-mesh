operation:
  cbottle.CbottleVideo:
    description: "Unrolls CBottle Video forecasts from an initial condition"
    parameters:
      dataset:
        description: "Input xarray.Dataset with dims including 'time', 'lat', 'lon' and CBottle variables"
        type: object
      n_steps:
        description: "Number of forecast steps to unroll (default: 12)"
        type: integer
      seed:
        description: "Optional RNG seed for reproducibility"
        type: integer
      device:
        description: "Device to use for inference (e.g., 'cuda', 'cuda:0', or 'cpu')"
        type: string
      lat_lon:
        description: "Whether to return data on a lat/lon grid or a nested HealPix grid (default: True)"
        type: boolean
    required:
      - dataset
    returns: object
interface:
  "#/operations/cbottle.CbottleVideo":
    adapter: nv_dfm_lib_weather.cbottle.CbottleVideo
    description: "Unrolls CBottle Video forecasts from an initial condition"
    is-async: true
    args:
      dataset:
        from-param: dataset
      n_steps:
        from-param: n_steps
      seed:
        from-param: seed
      device:
        from-param: device
      lat_lon:
        from-param: lat_lon