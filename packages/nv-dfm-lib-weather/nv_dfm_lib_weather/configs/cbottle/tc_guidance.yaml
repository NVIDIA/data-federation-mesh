operation:
  cbottle.CBottleTropicalCycloneGuidance:
    description: "Performs tropical cyclone guidance using CBottleTCGuidance model"
    parameters:
      lat_coords:
        description: "List of latitude coordinates for tropical cyclone positions"
        type: array
      lon_coords:
        description: "List of longitude coordinates for tropical cyclone positions"
        type: array
      times:
        description: "List of datetime objects for the guidance times"
        type: array
      sampler_steps:
        description: "Number of sampling steps for the diffusion process (default: 18)"
        type: integer
      sigma_max:
        description: "Maximum noise level for the diffusion process (default: 200.0)"
        type: number
      seed:
        description: "Random seed for reproducibility (default: None)"
        type: integer
      device:
        description: "Device to use for model inference. Options: 'cuda', 'cuda:N', 'cpu', or None for auto-select"
        type: string
      lat_lon:
        description: "Whether to return data on a lat/lon grid or a nested HealPix grid (default: True)"
        type: boolean
    required:
      - lat_coords
      - lon_coords
      - times
    returns: object
interface:
  "#/operations/cbottle.CBottleTropicalCycloneGuidance":
    adapter: nv_dfm_lib_weather.cbottle.CBottleTropicalCycloneGuidance
    description: "Performs tropical cyclone guidance using CBottleTCGuidance model"
    is-async: true
    args:
      lat_coords:
        from-param: lat_coords
      lon_coords:
        from-param: lon_coords
      times:
        from-param: times
      sampler_steps:
        from-param: sampler_steps
      sigma_max:
        from-param: sigma_max
      seed:
        from-param: seed
      device:
        from-param: device
      lat_lon:
        from-param: lat_lon