operation:
  cbottle.CbottleSuperResolution:
    description: "Performs super-resolution on a low-resolution dataset using CBottleSR to produce high-resolution outputs"
    parameters:
      dataset:
        description: "Input xarray.Dataset with variables and dims including 'time', 'lat', 'lon'"
        type: object
      output_resolution:
        description: "Target high-resolution (nlat, nlon). If omitted, model default is used"
        type: array
      super_resolution_window:
        description: "Optional geographic window (lat_s, lon_w, lat_n, lon_e) for regional SR"
        type: array
      sampler_steps:
        description: "Number of sampling steps for the diffusion process (default: 18)"
        type: integer
      sigma_max:
        description: "Maximum noise level for the diffusion process (default: 800.0)"
        type: number
      seed:
        description: "Random seed for reproducibility (default: None)"
        type: integer
      device:
        description: "Device to use for model inference. Options: 'cuda', 'cuda:N', 'cpu', or None for auto-select"
        type: string
      lat_lon:
        description: "Whether to return data on a lat/lon grid or a nested HealPix grid (default: True)"
        type: boolean
    required:
      - dataset
    returns: object
interface:
  "#/operations/cbottle.CbottleSuperResolution":
    adapter: nv_dfm_lib_weather.cbottle.CbottleSuperResolution
    description: "Performs super-resolution on a low-resolution dataset using CBottleSR to produce high-resolution outputs"
    is-async: true
    args:
      dataset:
        from-param: dataset
      output_resolution:
        from-param: output_resolution
      super_resolution_window:
        from-param: super_resolution_window
      sampler_steps:
        from-param: sampler_steps
      sigma_max:
        from-param: sigma_max
      seed:
        from-param: seed
      device:
        from-param: device
      lat_lon:
        from-param: lat_lon