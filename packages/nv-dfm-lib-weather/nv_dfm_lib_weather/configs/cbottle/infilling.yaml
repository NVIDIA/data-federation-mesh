operation:
  cbottle.CbottleInfilling:
    description: "Performs infilling on a dataset using CBottleInfill model to generate additional climate variables"
    parameters:
      dataset:
        description: "Input xarray.Dataset containing climate data"
        type: object
      input_variables:
        description: "List of variables to use as input for infilling (e.g., ['u10m', 'v10m', 't2m'])"
        type: array
      sampler_steps:
        description: "Number of sampling steps for the diffusion process (default: 18)"
        type: integer
      sigma_max:
        description: "Maximum noise level for the diffusion process (default: 80.0)"
        type: number
      seed:
        description: "Random seed for reproducibility (default: None)"
        type: integer
      device:
        description: "Device to use for model inference. Options: 'cuda', 'cuda:N', 'cpu', or None for auto-select"
        type: string
    required:
      - dataset
      - input_variables
    returns: object
interface:
  "#/operations/cbottle.CbottleInfilling":
    adapter: nv_dfm_lib_weather.cbottle.CbottleInfilling
    description: "Performs infilling on a dataset using CBottleInfill model to generate additional climate variables"
    is-async: true
    args:
      dataset:
        from-param: dataset
      input_variables:
        from-param: input_variables
      sampler_steps:
        from-param: sampler_steps
      sigma_max:
        from-param: sigma_max
      seed:
        from-param: seed
      device:
        from-param: device