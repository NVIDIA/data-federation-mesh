operation:
  cbottle.CbottleDataGen:
    description: "Generates synthetic climate data using CBottle3D diffusion model"
    parameters:
      variables:
        description: "The climate variables to generate (e.g., ['msl', 'tcwv'])"
        type: array
      time:
        description: "Timestamp string in ISO format (e.g., '2022-09-05T00:00:00')"
        type: string
      n_samples:
        description: "Number of samples to generate (default: 1)"
        type: integer
      seed:
        description: "Random seed for reproducibility (default: None)"
        type: integer
      device:
        description: "Device to use for model inference. Options: 'cuda', 'cuda:N', 'cpu', or None for auto-select"
        type: string
      lat_lon:
        description: "Whether to return data on a lat/lon grid or a nested HealPix grid (default: True)"
        type: boolean
    required:
      - variables
      - time
    returns: object
interface:
  "#/operations/cbottle.CbottleDataGen":
    adapter: nv_dfm_lib_weather.cbottle.CbottleDataGen
    description: "Generates synthetic climate data using CBottle3D diffusion model"
    is-async: true
    args:
      variables:
        from-param: variables
      time:
        from-param: time
      n_samples:
        from-param: n_samples
      seed:
        from-param: seed
      device:
        from-param: device
      lat_lon:
        from-param: lat_lon