operation:
  xarray.VariableNorm:
    description: "Computes the p-norm of specified variables in a dataset"
    parameters:
      data:
        description: "The xarray dataset to compute norm from"
        type: object
      variables:
        description: "The list of variables to compute norm for"
        type: array
      output_name:
        description: "The name of the output variable"
        type: string
      p:
        description: "The p value for the norm calculation (default: 2.0)"
        type: number
    required:
      - data
      - variables
    returns: object
interface:
  "#/operations/xarray.VariableNorm":
    adapter: nv_dfm_lib_weather.xarray.VariableNorm
    description: "Computes the p-norm of specified variables in a dataset"
    is-async: true
    args:
      data:
        from-param: data
      variables:
        from-param: variables
      output_name:
        from-param: output_name
      p:
        from-param: p
