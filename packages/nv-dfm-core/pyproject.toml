[project]
name = "nv-dfm-core"
dynamic = ["version"]
description = "Data Federation Mesh Core Framework"
authors = [{ name = "NVIDIA" }]
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "typing-extensions>=4.13.2,<5.0.0",
    "nvflare>=2.6.0,<2.7.0",
    "pydantic>=2.10.5,<3.0.0",
    "click>=8.1.8,<9.0.0",
    "sh>=2.2.1,<3.0.0",
    "ruamel-yaml>=0.18.10,<0.19.0",
    "gitpython>=3.1.44,<4.0.0",
    "xarray>=2025.3.1,<2026.0.0",
    "pooch>=1.8.2,<2.0.0",
    "jinja2>=3.1.6,<4.0.0",
    "pandera>=0.24.0,<0.25.0",
    "scipy>=1.7.0,<2.0.0",
    "hypothesis>=6.0.0,<7.0.0",
    "bottleneck>=1.3.0,<2.0.0",
    "pyproj>=3.0.0,<4.0.0",
    "fsspec>=2025.5.1,<2026.0.0",
    "appdirs>=1.4.4,<2.0.0",
    "universal-pathlib>=0.2.6,<0.3.0",
    "datamodel-code-generator>=0.35.0,<0.36.0",
]

[project.scripts]
dfm = "nv_dfm_core.cli.main:cli"

[project.optional-dependencies]
test = ["examplefed"]

[tool.hatch.version]
source = "vcs"
tag-pattern = "nv-dfm-v(?P<version>.*)"
raw-options = { root = "../.." }

[tool.hatch.build.hooks.vcs]
version-file = "nv_dfm_core/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["nv_dfm_core"]

[tool.hatch.build.targets.sdist]
include = ["nv_dfm_core", "README.md"]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"
