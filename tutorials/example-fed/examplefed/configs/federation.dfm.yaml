dfm: 1.0.0
info:
  api-version: 0.0.1
  code-package: examplefed
  description: "A tiny example federation that provides a GreetMe service"
provision:
  docker:
    image: examplefed
    tag: 0.0.1
    # Can be omitted if no Dockerfile is needed.
    # Path should be relative to the federation repository root.
    dockerfile:
      dir: tutorials/example-fed/examplefed/deploy/docker
      file: Dockerfile
    build:
      # podman or docker
      engine: docker
      # arm64 or amd64
      arch: amd64
      context: .
      save:
        # Save the image to a tar file
        enabled: false
        file: docker/examplefed-0.0.1.tar
      push:
        enabled: false
        registry:
          url: localhost/examplefed
          # If not provided or empty, login is skipped
          # Can be literal values or env variables (e.g. $CI_REGISTRY_USER)
          username: examplefed
          password: examplefed
  helm:
    # Path should be relative to federation directory configured in CLI.
    # It is managed using dfm fed config command(s).
    path: tutorials/example-fed/examplefed/deploy/helm
    name: examplefed
    # Can be "env" or "workspace". "env" means the startup packages paths are in the environment variables.
    # Variables: DFM_WORKSPACE_SERVER_INIT_PATH and DFM_WORKSPACE_CLIENT_INIT_PATH.
    # "workspace" means the startup packages are in the federation workspace.
    startup_package_source: env
operations:
  users.GreetMe:
    description: "Given a name, returns a nice greeting"
    parameters:
      name:
        description: "The name of the person to greet"
        type: string
    required:
      - name
    returns: string
sites:
  concierge:
    info:
      description: "The concierge app, greeting users locally. Allows a user to override the default greeting using a format string like 'Hello from {name}!'"
    interface:
      "#/operations/users.GreetMe":
        adapter: examplefed.lib.customer_service.GreetMe
        description: "Runs the standard greeting operation on the local site"
        is-async: true
        args:
          name:
            from-param: name
          greet_fmt:
            const: "Hello from the local app, {name}! How are you?"
            expose-as:
              param: greeting
              type: string
              description: "In the local concierge site, a user can override the default greeting using a format string like 'Hello from {name}!'"
  server:
    info:
      description: "The Example Fed central nvflare server. It has a fixed greeting message."
    interface:
      "#/operations/users.GreetMe":
        adapter: examplefed.lib.customer_service.GreetMe
        args:
          name:
            from-param: name
          greet_fmt:
            const: "Hello from the server, {name}! How are you?"
  reception:
    info:
      description: "Reception is a nvflare worker (aka client) that can produce remote greetings. Greetings from the reception are more formal in nature."
    interface:
      "#/operations/users.GreetMe":
        adapter: examplefed.lib.customer_service.GreetMeReception
        args:
          name:
            from-param: name
          venue:
            from-site: federation_name