{{- if .Values.reception.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-reception" (include "data-federation-mesh.fullname" .) }}
  labels:
    {{- include "data-federation-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: reception
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.reception.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "data-federation-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reception
  template:
    metadata:
      {{- with .Values.reception.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "data-federation-mesh.labels" . | nindent 8 }}
        {{- with .Values.reception.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app.kubernetes.io/component: reception
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reception.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.reception.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.reception.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.reception.service.port }}
              protocol: TCP
          {{- with .Values.reception.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.reception.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.reception.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- with .Values.reception.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
            - name: workspace-init
              mountPath: {{ .Values.reception.workspace.init.mount }}
              readOnly: true
          env:
          - name: DFM_FLARE_ROLE
            value: {{ .Values.reception.role | quote }}
          - name: DFM_FLARE_SITE
            value: {{ .Values.reception.site | quote }}
          - name: DFM_FLARE_WORKSPACE
            value: {{ .Values.reception.workspace.path | quote }}
          - name: DFM_FLARE_WORKSPACE_INIT
            value: {{ .Values.reception.workspace.init.path | quote }}
          - name: SERVICE_LOGGING_ENABLE_JSON
            value: {{ .Values.logging.json.enabled | quote }}
      automountServiceAccountToken: false
      volumes:
      {{- with .Values.reception.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
        - name: workspace-init
          secret:
            secretName: {{ .Values.reception.workspace.init.secret | quote }}
      {{- with .Values.reception.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reception.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reception.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}