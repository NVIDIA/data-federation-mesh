name: CI

on:
  workflow_call:
    outputs:
      ci_image:
        description: "Full CI container image reference"
        value: ${{ jobs.resolve-image.outputs.ci_image }}

jobs:
  resolve-image:
    uses: ./.github/workflows/resolve-ci-image.yml

  lint:
    name: Lint
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run linting
        run: ci/scripts/python-run-lint.sh

  format:
    name: Format
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run formatting check
        run: ci/scripts/python-run-format.sh

  unit-tests:
    name: Unit Tests
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run unit tests
        run: ci/scripts/python-test-package.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: artifacts/coverage/
          retention-days: 14

  build-docs:
    name: Build Docs
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build documentation
        run: ci/scripts/python-build-docs-gh.sh

      - name: Upload docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: artifacts/docs/
          retention-days: 14
