name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: read
  pages: write
  id-token: write

jobs:
  resolve-image:
    uses: ./.github/workflows/resolve-ci-image.yml

  build-wheels:
    name: Build Wheels
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build wheels
        run: ci/scripts/python-build-wheels-gh.sh

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: artifacts/dist/

  build-docs:
    name: Build Docs
    needs: resolve-image
    runs-on: linux-amd64-cpu4
    container:
      image: ${{ needs.resolve-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: echo "number=${GITHUB_REF_NAME#nv-dfm-v}" >> "$GITHUB_OUTPUT"

      - name: Build documentation
        run: ci/scripts/python-build-docs-gh.sh
        env:
          DOC_VERSION: ${{ steps.version.outputs.number }}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/docs/

  upload-release-assets:
    name: Upload Release Assets
    needs: build-wheels
    runs-on: linux-amd64-cpu4
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Attach wheels to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --repo "${{ github.repository }}"

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    runs-on: linux-amd64-cpu4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
