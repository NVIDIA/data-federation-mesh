name: Resolve CI Image

on:
  workflow_call:
    outputs:
      ci_image:
        description: "Full CI container image reference"
        value: ${{ jobs.resolve.outputs.ci_image }}

jobs:
  resolve:
    name: Resolve Image
    runs-on: linux-amd64-cpu4
    outputs:
      ci_image: ghcr.io/${{ steps.image.outputs.name }}:0.2.0
    steps:
      - name: Compute lowercased image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}/dfm-ci" >> "$GITHUB_OUTPUT"
