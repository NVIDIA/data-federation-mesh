name: Build CI Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. 1.0.0 or latest)"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/dfm-ci" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/docker/Dockerfile.gh.ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Set package visibility to private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="${{ github.event.repository.name }}/dfm-ci"
          ENCODED_NAME="${PACKAGE_NAME//\//%2F}"
          gh api --method PATCH \
            "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_NAME}" \
            -f visibility=private 2>&1 \
            || echo "::warning::Could not set package visibility to private via API. Please set it manually in the package settings."
